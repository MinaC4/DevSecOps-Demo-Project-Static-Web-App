apiVersion: v1
kind: Service
metadata:
  name: {{ include "iti-pro.fullname" . }}
  labels:
    {{- include "iti-pro.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    - name: metrics
      port: 9113
      targetPort: metrics
  selector:
    {{- include "iti-pro.selectorLabels" . | nindent 4 }}
