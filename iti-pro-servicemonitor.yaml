apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: iti-pro
  namespace: default
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: iti-pro
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      interval: 30s
      scrapeTimeout: 10s
      path: /
